rules:
  # ─── SQL Injection ───
  - id: xai-sql-injection-format-string
    patterns:
      - pattern: |
          $QUERY = f"...{$INPUT}..."
          ...
          $CURSOR.execute($QUERY, ...)
      - pattern: |
          $QUERY = "..." + $INPUT + "..."
          ...
          $CURSOR.execute($QUERY, ...)
    message: >
      Possible SQL injection via string formatting. User input is concatenated
      directly into a SQL query. Use parameterized queries instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: ["CWE-89: SQL Injection"]
      owasp: ["A03:2021 - Injection"]
      confidence: HIGH

  # ─── Hardcoded Secrets ───
  - id: xai-hardcoded-secret
    patterns:
      - pattern: $VAR = "..."
    metavariable-regex:
      metavariable: $VAR
      regex: (password|secret|api_key|token|private_key)
    message: >
      Hardcoded secret detected. Store secrets in environment variables
      or a secrets manager, never in source code.
    severity: ERROR
    languages: [python, javascript, typescript, go, java]
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      confidence: MEDIUM

  # ─── Insecure Deserialization ───
  - id: xai-pickle-load
    pattern: pickle.load(...)
    message: >
      Use of pickle.load() is dangerous — it can execute arbitrary code
      during deserialization. Use safer alternatives like json.loads().
    severity: WARNING
    languages: [python]
    metadata:
      cwe: ["CWE-502: Deserialization of Untrusted Data"]
      owasp: ["A08:2021 - Software and Data Integrity Failures"]
      confidence: HIGH

  # ─── Command Injection ───
  - id: xai-os-system-call
    patterns:
      - pattern: os.system($CMD)
      - pattern: subprocess.call($CMD, shell=True, ...)
      - pattern: subprocess.run($CMD, shell=True, ...)
    message: >
      Use of shell=True or os.system() with dynamic input can lead to
      command injection. Use subprocess with a list of arguments instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: ["CWE-78: OS Command Injection"]
      owasp: ["A03:2021 - Injection"]
      confidence: HIGH

  # ─── Weak Crypto ───
  - id: xai-weak-hash-md5
    patterns:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.sha1(...)
    message: >
      MD5 and SHA1 are cryptographically weak. Use SHA-256 or bcrypt
      for password hashing, and SHA-256+ for integrity checks.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: ["CWE-328: Use of Weak Hash"]
      confidence: MEDIUM
